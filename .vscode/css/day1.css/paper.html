<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Delivery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f8f8f8;
}

/* Navbar */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 50px;
    background:white;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
    color:#fc8019;
    font-size:30px;
    font-weight:bold;
}

.nav-links a{
    text-decoration:none;
    color:black;
    margin-left:25px;
    font-weight:bold;
}

/* Hero Section */
.hero{
    background:#fc8019;
    color:white;
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:48px;
    margin-bottom:15px;
}

.hero p{
    font-size:20px;
    margin-bottom:25px;
}

.search-box{
    width:60%;
    max-width:600px;
    padding:15px;
    border:none;
    border-radius:5px;
    font-size:18px;
}

/* Restaurant Section */
.restaurants{
    padding:40px;
}

.restaurants h2{
    margin-bottom:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card-content h3{
    margin-bottom:8px;
}

.rating{
    color:green;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">Foodie</div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Restaurants</a>
        <a href="#">Offers</a>
        <a href="#">Cart</a>
    </div>
</div>

<!-- Hero Section -->
<div class="hero">
    <h1>Order Food Online</h1>
    <p>Discover the best restaurants near you</p>
    <input type="text" class="search-box"
           placeholder="Search for restaurants or dishes">
</div>

<!-- Restaurants -->
<div class="restaurants">
    <h2>Popular Restaurants</h2>

    <div class="cards">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=800"
                 alt="Pizza">
            <div class="card-content">
                <h3>Pizza Palace</h3>
                <p>Italian, Pizza</p>
                <p class="rating">★ 4.5</p>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800"
                 alt="Burger">
            <div class="card-content">
                <h3>Burger Hub</h3>
                <p>Burgers, Fast Food</p>
                <p class="rating">★ 4.3</p>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1585937421612-70a008356fbe?w=800"
                 alt="Biryani">
            <div class="card-content">
                <h3>Biryani House</h3>
                <p>Indian, Biryani</p>
                <p class="rating">★ 4.7</p>
            </div>
        </div>

    </div>
</div>

</body>
</html>

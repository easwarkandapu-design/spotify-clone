<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body>

<center>
    <form>
    <table border="3">

        <tr>
            <th colspan="2">Registration Form</th>
        </tr>

        <tr>
            <td>Student</td>
            <td>
                <input type="text">
            </td>
        </tr>

        <tr>
            <td>Father's Name</td>
            <td>
                <input type="text">
            </td>
        </tr>

        <tr>
            <td>Mother's Name</td>
            <td>
                <input type="text">
            </td>
        </tr>

        <tr>
            <td>Date of Birth</td>
            <td>
                <input type="date">
            </td>
        </tr>

        <tr>
            <td>Gender</td>
            <td>
                male <input type="radio" name="gender">
                female <input type="radio" name="gender">
            </td>
        </tr>

        <tr>
            <td>Email ID</td>
            <td>
                <input type="email">
            </td>
        </tr>

        <tr>
            <td>Mobile No</td>
            <td>
                <input type="text">
            </td>
        </tr>

        <tr>
            <td>Address</td>
            <td>
                <textarea rows="10" cols="25"></textarea>
            </td>
        </tr>

        <tr>
            <td>State</td>
            <td>
                <input type="text">
            </td>
        </tr>

        <tr>
            <td>City</td>
            <td>
                <input type="text">
            </td>
        </tr>

        <tr>
            <td></td>
            <td>
                <input type="submit" value="submit">
            </td>
        </tr>

    </table>
</form>

</center>
</body>
</html>
